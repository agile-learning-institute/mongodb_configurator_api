openapi: 3.0.3
info:
  title: MongoDB Configurator API
  description: |
    API for managing MongoDB configurations
  version: 1.0.0
  contact:
    email: devs@agile-learning.institute
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8081
    description: Local development server

paths:
  /api/collections/:
    get:
      summary: List collection summaries
      description: |
        Returns a collection-centric view of the configuration repository.
        Each item includes collection name, configuration file, latest dictionary file,
        latest version, and locked status. Simplifies the SPA's dictionary-first refactor.
      operationId: list_collections
      tags:
        - Collections
      responses:
        '200':
          description: List of collection summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - collection_name
                    - configuration_file
                    - latest_dictionary_file
                    - latest_version
                  properties:
                    collection_name:
                      type: string
                      description: Derived from configuration name
                    configuration_file:
                      type: string
                      description: Configuration file name (e.g., sample.yaml)
                    latest_dictionary_file:
                      type: string
                      description: Dictionary file for latest version (e.g., sample.1.0.0.yaml)
                    latest_version:
                      type: string
                      description: Latest version string (e.g., 1.0.0.0)
                    _locked:
                      type: boolean
                      description: Whether the latest version is locked
                    description:
                      type: string
                      description: Configuration description (from configuration file)
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /docs/index.html:
    get:
      summary: (this) API Explorer
      description: Interactive API documentation
      tags:
        - Documentation
      responses:
        '200':
          description: API Explorer HTML page
          content:
            text/html:
              schema:
                type: string
  /api/configurations/:
    get:
      summary: List all Collection Configurations
      deprecated: true
      description: |
        Deprecated. Use GET /api/collections/ for the collection-centric view.
        This endpoint remains functional for backward compatibility.
      tags:
        - Collection Configurations
      operationId: list_configurations
      responses:
        '200':
          description: List of collections configuration files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/files'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    post:
      summary: Process all Configured Collections 
      tags:
        - Collection Configurations
      operationId: process_collections
      responses:
        '200':
          description: All configured collections processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '500':
          description: Processing error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    patch:
      summary: Lock all Collection Configurations
      operationId: lock_all_configurations
      tags:
        - Collection Configurations
      responses:
        '200':
          description: All configurations locked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/configurations/{file_name}/:
    get:
      summary: Get a collection configuration
      operationId: get_configuration
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection configuration object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/configuration'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    put:
      summary: Save a collection configuration
      operationId: save_configuration
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/configuration'
      responses:
        '200':
          description: Collection configuration file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/configuration'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    post:
      summary: Process a collection configuration
      operationId: process_collection
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection configured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    delete:
      summary: Delete a collection configuration
      operationId: delete_configuration
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection configuration deleted
          content:    
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/configurations/collection/{name}:
    post:
      summary: Create a new collection
      description: |
        Creates a new collection by generating configuration, dictionary, and test_data files.
        New collections start at version 1.0.0.0. Creates: configuration file, dictionary file (from template),
        and empty test_data JSON array. Optional description in request body for dictionary template substitution.
      tags:
        - Collection Configurations
      parameters:
        - name: name
          in: path
          required: true
          description: The name of the collection to create
          schema:
            type: string
            pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
            example: "my_collection"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                  description: Optional description for the collection (used in dictionary template)
      responses:
        '200':
          description: Collection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create_collection_response'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/configurations/json_schema/{file_name}/latest/:
    get:
      summary: Get JSON Schema for latest version
      description: |
        Returns the JSON Schema for the latest version defined in the configuration.
        No version parameter required; the configuration file is read to determine the latest version.
      operationId: get_json_schema_latest
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            description: Configuration file name (e.g., sample.yaml)
            type: string
      responses:
        '200':
          description: JSON Schema for the latest version
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/configurations/json_schema/{file_name}/{version}/:
    get:
      summary: Get a Json Schema 
      description: Json Schema for a specific schema version (e.g., 1.0.0.1")
      operationId: render_json_schema
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            description: Configuration file name
            type: string
        - name: version
          in: path
          required: true
          schema:
            description: Version string (e.g., "1.0.0.1")
            type: string
      responses:
        '200':
          description: Schema
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/configurations/bson_schema/{file_name}/{version}/:
    get:
      summary: Get a Bson Schema 
      description: Bson Schema for a specific schema version (e.g., "sample.1.0.0.1")
      operationId: render_bson_schema
      tags:
        - Collection Configurations
      parameters:
        - name: file_name
          in: path
          required: true
          schema:
            description: Configuration file name
            type: string
        - name: version
          in: path
          required: true
          schema:
            description: Version string (e.g., "1.0.0.1")
            type: string
      responses:
        '200':
          description: Schema
          content:
            application/json:
              schema:
                type: object
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/dictionaries/:
    get:
      summary: List all Dictionaries
      operationId: list_dictionaries
      tags:
        - Data Dictionaries
      responses:
        '200':
          description: List of dictionaries configuration files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/files'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
    patch:
      summary: Lock all Dictionaries
      operationId: lock_all_dictionaries
      tags:
        - Data Dictionaries
      responses:
        '200':
          description: All dictionaries locked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/event'

  /api/dictionaries/{file_name}/:
    get:
      summary: Get a dictionary 
      operationId: get_dictionary
      tags:
