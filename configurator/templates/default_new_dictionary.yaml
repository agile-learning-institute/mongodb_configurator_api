# Default dictionary template for new collections.
# Placeholders: {{collection_name}}, {{description}}
name: root
description: "{{description}}"
type: object
properties:
  - name: _id
    description: A unique identifier for {{collection_name}}
    type: identifier
    required: true
  - name: name
    description: The name
    type: word
    required: true
  - name: status
    description: The current status
    type: enum
    enums: default_status
    required: true
  - name: last_saved
    description: The last time this document was saved
    type: breadcrumb
    required: true
